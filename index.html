<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navvi — Product Prototype</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --accent: #5b8fff;
      --accent2: #a78bfa;
      --text: #f0f0f5;
      --muted: rgba(240,240,245,0.4);
      --border: rgba(255,255,255,0.07);
      --pw: 393px;
      --ph: 852px;
      --pr: 52px;
      --pb: 12px;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 55% 45% at 18% 28%, rgba(91,143,255,0.09) 0%, transparent 65%),
        radial-gradient(ellipse 45% 55% at 82% 72%, rgba(167,139,250,0.08) 0%, transparent 65%);
    }

    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 56px 56px;
    }

    .scene {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      gap: 56px; width: 100vw; height: 100vh; padding: 24px;
    }

    /* Left panel */
    .left {
      display: flex; flex-direction: column;
      gap: 22px; width: 240px; flex-shrink: 0;
      animation: up 0.7s ease both;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(91,143,255,0.1);
      border: 1px solid rgba(91,143,255,0.22);
      border-radius: 100px; padding: 5px 13px;
      font-size: 10.5px; font-weight: 500;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--accent); width: fit-content;
    }

    .badge-dot {
      width: 6px; height: 6px; background: var(--accent);
      border-radius: 50%; box-shadow: 0 0 7px var(--accent);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.75); }
    }

    .left h1 {
      font-family: 'Syne', sans-serif;
      font-size: 38px; font-weight: 800;
      line-height: 1.05; letter-spacing: -0.025em;
    }

    .left h1 span {
      background: linear-gradient(130deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .rule { width: 36px; height: 1px; background: linear-gradient(90deg, var(--accent), transparent); }

    .left p { font-size: 13px; line-height: 1.72; color: var(--muted); font-weight: 300; }

    .tags { display: flex; flex-direction: column; gap: 9px; }

    .tag { display: flex; align-items: center; gap: 9px; font-size: 11.5px; color: var(--muted); }
    .tag-dot { width: 3px; height: 3px; background: var(--accent2); border-radius: 50%; flex-shrink: 0; }

    /* Phone */
    .phone-wrap {
      position: relative; flex-shrink: 0;
      animation: up 0.7s 0.12s ease both;
      filter:
        drop-shadow(0 48px 96px rgba(0,0,0,0.65))
        drop-shadow(0 0 48px rgba(91,143,255,0.07));
    }

    .phone {
      position: relative;
      width: var(--pw); height: var(--ph);
      background: #1c1c1e;
      border-radius: var(--pr);
      border: var(--pb) solid #2c2c2e;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.1),
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 0 0 1px rgba(0,0,0,0.5);
    }

    .phone::before {
      content: '';
      position: absolute; left: -14px; top: 112px;
      width: 3px; height: 30px;
      background: #3a3a3c; border-radius: 2px 0 0 2px;
      box-shadow: 0 46px 0 #3a3a3c, 0 90px 0 #3a3a3c;
    }

    .phone::after {
      content: '';
      position: absolute; right: -14px; top: 172px;
      width: 3px; height: 70px;
      background: #3a3a3c; border-radius: 0 2px 2px 0;
    }

    .screen {
      position: relative; width: 100%; height: 100%;
      border-radius: calc(var(--pr) - var(--pb));
      background: #000; overflow: hidden;
    }

    .island {
      position: absolute; top: 11px; left: 50%;
      transform: translateX(-50%);
      width: 124px; height: 36px;
      background: #000; border-radius: 20px; z-index: 20;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .island-cam {
      width: 11px; height: 11px; background: #0c0c0c;
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.04);
      position: relative;
    }

    .island-cam::after {
      content: ''; position: absolute; inset: 0; margin: auto;
      width: 5px; height: 5px; background: #0f0f0f; border-radius: 50%;
      border: 1px solid rgba(91,143,255,0.25);
    }

    .island-mic { width: 52px; height: 5px; background: #0c0c0c; border-radius: 3px; }

    .statusbar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 58px; z-index: 19;
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 0 26px 7px; pointer-events: none;
      background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, transparent 100%);
    }

    .sb-time {
      font-family: -apple-system, sans-serif;
      font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.4px;
    }

    .sb-icons { display: flex; align-items: center; gap: 5px; }

    .bars { display: flex; align-items: flex-end; gap: 1.5px; height: 11px; }
    .bars span { width: 2.5px; background: #fff; border-radius: 1px; }
    .bars span:nth-child(1) { height: 3px; }
    .bars span:nth-child(2) { height: 5.5px; }
    .bars span:nth-child(3) { height: 8px; }
    .bars span:nth-child(4) { height: 11px; }

    /* App iframe — proxied URL, no cross-origin block */
    .app-clip {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden; border-radius: inherit;
    }

    .app-iframe {
      position: absolute; top: 0; left: 0;
      width: 390px; height: 844px;
      border: none;
      transform-origin: top left;
      transform: scale(0.9462);
    }

    .gloss {
      position: absolute; top: 0; left: 0; right: 0; height: 48%;
      background: linear-gradient(155deg, rgba(255,255,255,0.028) 0%, transparent 55%);
      border-radius: inherit; pointer-events: none; z-index: 21;
    }

    .homebar {
      position: absolute; bottom: 7px; left: 50%;
      transform: translateX(-50%);
      width: 130px; height: 4px;
      background: rgba(255,255,255,0.2); border-radius: 2px; z-index: 22;
    }

    /* Right panel */
    .right {
      display: flex; flex-direction: column;
      gap: 12px; width: 190px; flex-shrink: 0;
      animation: up 0.7s 0.24s ease both;
    }

    .panel-label {
      font-size: 10px; letter-spacing: 0.13em;
      text-transform: uppercase; color: var(--muted);
      font-weight: 500; margin-bottom: 2px;
    }

    .btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 13px;
      background: rgba(255,255,255,0.028);
      border: 1px solid var(--border); border-radius: 11px;
      color: var(--muted); font-size: 12px;
      font-family: 'Inter', sans-serif;
      cursor: pointer; text-decoration: none;
      transition: all 0.18s ease;
    }

    .btn:hover {
      background: rgba(91,143,255,0.08);
      border-color: rgba(91,143,255,0.28); color: var(--text);
    }

    .btn.primary {
      background: rgba(91,143,255,0.11);
      border-color: rgba(91,143,255,0.32); color: var(--accent);
    }

    .btn.primary:hover { background: rgba(91,143,255,0.2); }

    .btn-ico {
      width: 27px; height: 27px;
      background: rgba(91,143,255,0.09); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0;
    }

    @keyframes up {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    @media (max-width: 1080px) {
      .left, .right { display: none; }
      .scene { gap: 0; }
    }

    @media (max-height: 920px) { .phone-wrap { transform: scale(0.88); } }
    @media (max-height: 820px) { .phone-wrap { transform: scale(0.76); } }
    @media (max-height: 700px) { .phone-wrap { transform: scale(0.64); } }
  </style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="scene">

  <div class="left">
    <div class="badge"><div class="badge-dot"></div>Live Prototype</div>
    <h1>Navvi<br/><span>for Microsoft</span></h1>
    <div class="rule"></div>
    <p>An interactive product prototype exploring AI-powered navigation within the Microsoft ecosystem.</p>
    <div class="tags">
      <div class="tag"><div class="tag-dot"></div>Product Case Study</div>
      <div class="tag"><div class="tag-dot"></div>iOS App Prototype</div>
      <div class="tag"><div class="tag-dot"></div>Built with Lovable</div>
    </div>
  </div>

  <div class="phone-wrap">
    <div class="phone">
      <div class="screen">

        <div class="island">
          <div class="island-cam"></div>
          <div class="island-mic"></div>
        </div>

        <div class="statusbar">
          <div class="sb-time" id="clock">9:41</div>
          <div class="sb-icons">
            <div class="bars"><span></span><span></span><span></span><span></span></div>
            <svg width="15" height="11" viewBox="0 0 16 12" fill="white">
              <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm0-3.5a5.5 5.5 0 0 1 3.9 1.6l-1.4 1.4A3.5 3.5 0 0 0 8 7.5a3.5 3.5 0 0 0-2.5 1L4.1 7.1A5.5 5.5 0 0 1 8 6zm0-3.5a9 9 0 0 1 6.4 2.65L13 6.5A7 7 0 0 0 8 4.5 7 7 0 0 0 3 6.5L1.6 5.15A9 9 0 0 1 8 2.5z"/>
            </svg>
            <svg width="24" height="11" viewBox="0 0 25 12" fill="none">
              <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" stroke-opacity="0.3"/>
              <rect x="2" y="2" width="16" height="8" rx="2" fill="white"/>
              <path d="M23 4v4a2 2 0 0 0 0-4z" fill="white" fill-opacity="0.4"/>
            </svg>
          </div>
        </div>

        <div class="app-clip">
          <!-- Points to /proxy which goes through the edge function -->
          <iframe
            id="appFrame"
            class="app-iframe"
            src="/proxy"
            title="Navvi Prototype"
          ></iframe>
        </div>

        <div class="gloss"></div>
        <div class="homebar"></div>

      </div>
    </div>
  </div>

  <div class="right">
    <div class="panel-label">Actions</div>
    <a class="btn primary"
       href="https://navvi-microsoft-case-study-product.vercel.app/"
       target="_blank">
      <div class="btn-ico">↗</div>
      Open Full Screen
    </a>
    <button class="btn" onclick="copyLink()">
      <div class="btn-ico">⎘</div>
      <span id="copy-label">Copy Link</span>
    </button>
    <button class="btn" onclick="window.print()">
      <div class="btn-ico">⬒</div>
      Export PDF
    </button>
  </div>

</div>

<script>
  function tick() {
    const n = new Date();
    document.getElementById('clock').textContent =
      `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`;
  }
  tick(); setInterval(tick, 10000);

  function copyLink() {
    navigator.clipboard.writeText('https://navvi-prototype.vercel.app/').then(() => {
      const el = document.getElementById('copy-label');
      el.textContent = 'Copied!';
      setTimeout(() => el.textContent = 'Copy Link', 2000);
    });
  }
</script>
</body>
</html>
